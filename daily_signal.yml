name: "🤖 Crypto Signal Bot — Daily Analysis"

on:
  # Ejecución automática: 07:00 UTC = 09:00 CEST (hora España verano)
  # En invierno (CET, UTC+1) serán las 08:00. Ajustar si necesario.
  schedule:
    - cron: "0 7 * * *"

  # Permite ejecución manual desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  analyze-and-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run Crypto Signal Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
        run: python main.py
